services:
  price-monitor:
    build: .
    command: python buibui.py monitor price --live
    # .env is excluded from the image via .dockerignore (security).
    # Supply it at runtime via env_file. Without it the container will fail on startup.
    env_file: .env
    volumes:
      # config/coins.json is excluded from the image via .dockerignore (security).
      # Supply it at runtime via this bind mount. Without it the container will fail on startup.
      - ./config/coins.json:/app/config/coins.json:ro
    restart: unless-stopped

  position-monitor:
    build: .
    command: python buibui.py monitor position --telegram
    # .env is excluded from the image via .dockerignore (security).
    # Supply it at runtime via env_file. Without it the container will fail on startup.
    env_file: .env
    volumes:
      # config/coins.json is excluded from the image via .dockerignore (security).
      # Supply it at runtime via this bind mount. Without it the container will fail on startup.
      - ./config/coins.json:/app/config/coins.json:ro
    restart: unless-stopped

  signal-watch:
    build: .
    # No --config: the daemon auto-picks today's config by SGT (UTC+8) weekday
    # (signal_watch.toml for Tue–Thu, signal_watch_weekdays.toml for Mon+Fri,
    # signal_watch_all.toml for Sat+Sun). Restart at a UTC midnight to refresh
    # the pick. Pass --config <file> here to force a specific config.
    command: python buibui.py signal watch --telegram
    # .env is excluded from the image via .dockerignore (security).
    # Supply it at runtime via env_file. Without it the container will fail on startup.
    env_file: .env
    volumes:
      - ./config/coins.json:/app/config/coins.json:ro
      # analytics.db is bind-mounted for OHLCV data. Create before first run: touch analytics.db
      - ./analytics.db:/app/analytics.db
      # signal_state.json persists cooldown/watermark state across restarts.
      # Create before first run: touch signal_state.json
      - ./signal_state.json:/app/signal_state.json
    restart: unless-stopped

  analytics-backfill:
    build: .
    # Override SINCE at runtime: SINCE=2024-01-01 docker-compose run --rm analytics-backfill
    command: >
      python buibui.py analytics backfill --since ${SINCE:-2023-01-01}
    env_file: .env
    volumes:
      - ./config/coins.json:/app/config/coins.json:ro
      # analytics.db is bind-mounted from the host so data survives container restarts.
      # Create the file on the host before first run: touch analytics.db
      - ./analytics.db:/app/analytics.db
    profiles: [analytics]

  analytics-sync:
    build: .
    command: python buibui.py analytics sync
    env_file: .env
    volumes:
      - ./config/coins.json:/app/config/coins.json:ro
      - ./analytics.db:/app/analytics.db
    profiles: [analytics]
