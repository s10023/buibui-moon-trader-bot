name: Verify Data Source Geo-Access

# THROWAWAY PROBE — verifies OKX public market-data reachability from US GitHub
# runners across MULTIPLE distinct runner IPs (5-way matrix = 5 separate runners).
# Bybit is already known geo-blocked (HTTP 403, run 26407655152); kept here only as
# a control. OKX is the chosen crypto data source for the scheduled signal-watch —
# this confirms it is reliably reachable (not flaky per-IP) before the adapter is built.
#
# Probes the exact OKX endpoints the adapter will use:
#   - /api/v5/market/candles        (recent window)
#   - /api/v5/market/history-candles (deep history — the ~256-day backfill path)
#
# Run with:  gh workflow run verify-data-source.yaml --ref main
# Read the "aggregate" job summary for the tally across all 5 samples.

on:
  workflow_dispatch:

jobs:
  probe:
    strategy:
      fail-fast: false
      matrix:
        sample: [1, 2, 3, 4, 5]   # 5 jobs -> 5 distinct runner IPs
    runs-on: ubuntu-latest
    steps:
      - name: Probe (sample ${{ matrix.sample }})
        run: |
          set +e
          IP_JSON=$(curl -s -m 15 https://ipinfo.io/json)
          IP=$(echo "$IP_JSON"   | grep -o '"ip": *"[^"]*"'      | head -1 | sed 's/.*: *"//;s/"//')
          CITY=$(echo "$IP_JSON" | grep -o '"city": *"[^"]*"'    | head -1 | sed 's/.*: *"//;s/"//')
          REGION=$(echo "$IP_JSON" | grep -o '"region": *"[^"]*"' | head -1 | sed 's/.*: *"//;s/"//')

          code() { curl -s -m 15 -A "geo-probe/1.0" -o /dev/null -w "%{http_code}" "$1"; }
          OKX_C=$(code "https://www.okx.com/api/v5/market/candles?instId=BTC-USDT-SWAP&bar=1H&limit=1")
          OKX_H=$(code "https://www.okx.com/api/v5/market/history-candles?instId=BTC-USDT-SWAP&bar=1H&limit=1")
          BYBIT=$(code "https://api.bybit.com/v5/market/kline?category=linear&symbol=BTCUSDT&interval=60&limit=1")

          echo "Sample ${{ matrix.sample }} | IP=$IP ($CITY, $REGION)"
          echo "  OKX candles:         HTTP $OKX_C"
          echo "  OKX history-candles: HTTP $OKX_H"
          echo "  Bybit (control):     HTTP $BYBIT"

          mkdir -p out
          echo "${{ matrix.sample }}|$IP ($CITY, $REGION)|$OKX_C|$OKX_H|$BYBIT" > "out/result.txt"

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: okx-probe-${{ matrix.sample }}
          path: out/result.txt
          retention-days: 1

  aggregate:
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: okx-probe-*
          path: results
          # No merge-multiple: each artifact extracts to results/okx-probe-N/result.txt
          # (identical filenames would clobber under merge-multiple).

      - name: Tally
        run: |
          set +e
          # Each artifact extracted to its own subdir; find reads all 5.
          echo "| Sample | Runner IP | OKX candles | OKX history | Bybit (control) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"

          OKX_OK=0
          TOTAL=0
          while IFS='|' read -r s ip okc okh by; do
            [ -z "$s" ] && continue
            TOTAL=$((TOTAL+1))
            [ "$okc" = "200" ] && [ "$okh" = "200" ] && OKX_OK=$((OKX_OK+1))
            echo "| $s | $ip | $okc | $okh | $by |" >> "$GITHUB_STEP_SUMMARY"
            echo "Sample $s: IP=$ip OKX_candles=$okc OKX_history=$okh Bybit=$by"
          done < <(find results -name 'result.txt' -exec cat {} \;)

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**OKX fully reachable (both endpoints 200): $OKX_OK / $TOTAL samples**" >> "$GITHUB_STEP_SUMMARY"
          echo "OKX fully reachable: $OKX_OK / $TOTAL"

          if [ "$TOTAL" -gt 0 ] && [ "$OKX_OK" = "$TOTAL" ]; then
            echo "RESULT: OKX reachable on every sampled runner — safe to build the OKX adapter." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          else
            echo "RESULT: OKX has a block rate ($OKX_OK/$TOTAL) — production job needs explicit fallback handling." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
