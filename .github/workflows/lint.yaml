name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  markdownlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for Markdown changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            markdown:
              - '**/*.md'
              - '.markdownlint.json'
              - '.markdownlint-cli2.jsonc'

      - name: markdownlint-cli2
        if: steps.changes.outputs.markdown == 'true'
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.json
          globs: |
            **/*.md
            !venv

  lint-typecheck-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for Python changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'poetry.lock'
              - '.github/workflows/lint.yaml'

      - name: Set up Python
        if: steps.changes.outputs.python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Poetry
        if: steps.changes.outputs.python == 'true'
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        if: steps.changes.outputs.python == 'true'
        run: make poetry-install

      - name: Lint Python
        if: steps.changes.outputs.python == 'true'
        run: poetry run ruff check .

      - name: Check Python formatting
        if: steps.changes.outputs.python == 'true'
        run: poetry run ruff format --check .

      - name: Type check
        if: steps.changes.outputs.python == 'true'
        run: poetry run mypy .

      - name: Run tests
        if: steps.changes.outputs.python == 'true'
        run: poetry run pytest tests/ -v --cov --cov-report=term-missing --cov-report=xml --junitxml=test-results.xml --ignore=tests/test_regression.py

      - name: Upload test results
        if: steps.changes.outputs.python == 'true' && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  regression:
    name: Regression tests
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for Python changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'config/*.toml'
              - 'tests/fixtures/**.parquet'
              - 'tests/fixtures/golden_*.json'
              - '.github/workflows/lint.yaml'

      - name: Set up Python
        if: steps.changes.outputs.python == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Poetry
        if: steps.changes.outputs.python == 'true'
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        if: steps.changes.outputs.python == 'true'
        run: make poetry-install

      - name: Run regression tests
        if: steps.changes.outputs.python == 'true'
        run: make test-regression

  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check for frontend changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            frontend:
              - 'web/ui/**'
              - '.github/workflows/lint.yaml'

      - name: Set up Node
        if: steps.changes.outputs.frontend == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/ui/package-lock.json

      - name: Install frontend dependencies
        if: steps.changes.outputs.frontend == 'true'
        run: cd web/ui && npm ci

      - name: Build frontend
        if: steps.changes.outputs.frontend == 'true'
        run: cd web/ui && npm run build

      - name: Svelte type check
        if: steps.changes.outputs.frontend == 'true'
        run: cd web/ui && npx svelte-check
