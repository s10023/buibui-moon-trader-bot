# Swing trading profile — medium/higher timeframes, trend-following strategies.
#
# Purpose: catch multi-day moves on 4h and 1d candles.
# Best suited for: trend_day, marubozu, fib_golden_zone, order_block, eqh_eql,
#                  morning_evening_star, bos (as trend-continuation confirmation).
# Not included: noise-heavy short-TF strategies (orb, doji, inside_bar).
#
# Usage: make buibui-signal-watch CONFIG=config/swing.toml

timeframes = ["4h", "1d"]
telegram = true
min_sl_pct = 0.01

# Wider SL for swing setups, 3x R target
sl_pct = 0.03
tp_r = 3.0

# Longer cooldown — same setup shouldn't re-fire within 24 hours
cooldown_seconds = 86400

# Trend-following and structural strategies
strategies = [
    'trend_day',
    'marubozu',
    'fib_golden_zone',
    'order_block',
    'eqh_eql',
    'morning_evening_star',
    'bos',
    'engulfing',
    'hammer_hanging_man',
    'liquidity_sweep',
]

# ICT weekly cycle — suppress Mon/Fri noise on longer TFs
day_filter = true

# EMA-50 trend gate for smt_divergence
smt_trend_filter = 1

# Backtest window — use a longer window for swing trade validation
days = 200
min_trades = 20         # global fallback
# Per-TF overrides — calibrated from DB (200d). To scale: base × (your_days / 200)
min_trades_4h = 10
min_trades_1d = 5
fee_pct = 0.0005

# trend_day restricted to its valid TFs (also the only TFs in this profile)
[strategy_timeframes]
trend_day = ["4h", "1d"]

[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

[backtest]
mode = "hard"
days = 200
# Thresholds apply to directional trade count (longs for LONG alerts, shorts for SHORT).
# Recalibrated from backtest_runs DB p25 directional counts (90d window):
#   4h p25_long=4 → 5, 1d p25_long=0 → 2
min_trades = 12         # global fallback (directional)
min_trades_4h = 5
min_trades_1d = 2
filter_threshold = 0.4
