# Signal Watch — weekend-only profile (Sat+Sun, complements signal_watch.toml
# Tue–Thu and signal_watch_weekdays.toml Mon+Fri so the three configs together
# tile the calendar without overlap).
# Usage: make buibui-signal-watch CONFIG=config/signal_watch_all.toml
#
# Filename kept as "all" for compatibility (Makefile, regression fixtures, DB
# rating keys); day_filter scope is Sat+Sun only.
#
# Inherits: smt_pairs, bias, backtest defaults, and consistent per-strategy flags
# from strategy_params.toml. Only weekend-specific values are defined here.

extends = "strategy_params.toml"

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]

# Suppress signals by day — weekend only (Sat+Sun).
# Valid values: "off" | "weekdays" | "mon_fri" | "tue_thu" | "weekend" | "no_monfi"
day_filter = "weekend"

# Full strategy set — no TF suppression
strategies = [
    'wick_fill',
    'marubozu',
    'orb',
    'liquidity_sweep',
    'fvg',
    'bos',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone',
    'ema'
]

# atr_sl_multiplier = 2.0  # ATR-based SL: SL distance = N × ATR14; overrides sl_pct when set
# atr_sl_multiplier_values = [0.5, 1.0, 1.5, 2.0, 2.5]  # sweep: comparison table across multipliers
# tp_r_values = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

[strategy_timeframes]
trend_day        = ["4h", "1d"]          # 15m=-0.03R, 1h≈0.00R excluded
fib_golden_zone  = ["1h", "4h", "1d"]   # 15m all negative excluded
eqh_eql          = ["4h", "1d"]         # 2026-05-17 T6 Phase A strategy_timeframes audit: 1h dropped (raw -0.147R n=242; cr combined -0.140R 1★, long -0.413R 1★, short +0.034R 2★ — short marginally positive but below +0.10R / 3★ Bucket C bar). 15m already excluded.
smt_divergence   = ["15m", "1h", "4h"]  # 1d=4 trades 25% WR excluded
orb              = ["1h", "4h"]          # 15m all negative; 1d=n/a
bos              = ["15m", "1h", "4h"]   # 1d=-0.30R to -1.01R excluded
liquidity_sweep  = ["1h", "1d"]          # 15m/4h all negative
marubozu         = ["4h", "1d"]          # 15m/1h all negative
ema              = ["4h", "1d"]          # 2026-05-17 T6 Phase A day-filter audit: 15m+1h dropped (15m combined -0.66R 17% WR; 1h combined -0.44R 12% WR — long -1.06R 0% WR). All 4 cells both-direction ENABLE.
engulfing        = ["15m", "1d"]         # 2026-05-17 T6 Phase A strategy_timeframes audit: 1h+4h dropped (1h raw -0.055R n=192 cr -0.068R 1★ all dirs negative; 4h raw -0.213R n=43 cr -0.214R 1★).
fvg              = ["4h", "1d"]          # 2026-05-17 T6 Phase A strategy_timeframes audit: 15m+1h dropped (15m raw -0.178R n=142 cr -0.175R 1★ all dirs negative; 1h raw -0.105R n=61 cr -0.118R 1★). Volume_suppress=true already on; numbers reflect gate active.
morning_evening_star = ["15m", "1h", "1d"]  # 2026-05-17 T6 Phase A strategy_timeframes audit: 4h dropped (raw -0.205R n=145; cr combined -0.232R 1★, long -0.074R 1★, short -0.390R 1★).
order_block      = ["1h", "1d"]          # 2026-05-17 T6 Phase A strategy_timeframes audit: 15m+4h dropped (15m raw -0.244R n=212 cr -0.258R 1★ both dirs negative; 4h raw -0.270R n=63 cr -0.362R 1★).
pin_bar          = ["15m", "4h", "1d"]   # 2026-05-17 T6 Phase A strategy_timeframes audit: 1h dropped (raw -0.170R n=453; cr combined -0.171R 1★, long -0.265R 1★, short -0.039R 1★).

# Per-strategy parameter overrides — tp_r and sl_pct.
# Derived from TP sweep (200d, all days, 3 symbols — BTCUSDT/ETHUSDT/SOLUSDT).
# Re-run after major data changes: make buibui-backtest CONFIG=config/signal_watch_all.toml SAVE=1

[strategy_params.ema]
tp_r = 3.0                    # spec §6 default; tune per-TF after WFO sweep

[strategy_params.engulfing]
tp_r_15m = 4.0                # sweep confirmed: +0.24R (after volume_suppress_long)
tp_r_1h  = 4.0                # sweep confirmed: +0.26R
tp_r_4h  = 3.5                # sweep confirmed: +0.32R (tied at 4.0R; higher WR at 3.5R)
tp_r_1d  = 2.5                # sweep peak: +0.47R (clear peak); was 3.0=+0.34R
volume_suppress = false       # A14b: low-vol edge for SHORT; volume_suppress_long=true from base handles LONG

[strategy_params.pin_bar]
tp_r_15m = 3.0                # +0.09R
tp_r_1h  = 4.0                # TP sweep peak: cross-symbol +0.10R (was 5.0=+0.03R); longs use tp_r_long=5.0 from base
tp_r_4h  = 3.5                # +0.13R
tp_r_1d  = 3.5                # +0.73R (48 trades)

[strategy_params.hammer_hanging_man]
tp_r_15m = 3.0                # +0.06R
tp_r_1h  = 5.0                # +0.18R (monotonically increasing)
tp_r_4h  = 4.0                # +0.18R
tp_r_1d  = 3.0                # +0.52R (23 trades)

[strategy_params.doji]
tp_r_15m = 4.0                # sweep confirmed: +0.15R
tp_r_1h  = 3.0                # sweep confirmed: +0.23R
tp_r_4h  = 1.5                # sweep peak: +0.13R (79 trades); was 3.0=+0.11R (degraded)
tp_r_1d  = 4.5                # sweep confirmed: +0.58R (21 trades); was +1.05R (canonical window change)
volume_suppress_long = false  # T6 Phase A gate audit (2026-05-16): 15m long n=269 supp=+0.548R, 1h long n=64 supp=+0.388R → DISABLE (low-vol IS the winner)
volume_suppress_short = true  # T6 Phase A gate audit: 15m short n=235 supp=-0.135R, 1h short n=54 supp=-0.087R → ENABLE

[strategy_params.inside_bar]
tp_r_15m = 3.5                # +0.06R
tp_r_1h  = 2.5                # +0.09R
tp_r_4h  = 3.5                # +0.15R
tp_r_1d  = 5.0                # +0.31R (67 trades, monotonically increasing)

[strategy_params.morning_evening_star]
tp_r_15m = 3.5                # +0.08R
tp_r_1h  = 3.5                # +0.10R
tp_r_4h  = 5.0                # +0.21R (monotonically increasing)
tp_r_1d  = 3.5                # +0.66R (63 trades)

[strategy_params.eqh_eql]
tp_r_1h  = 5.0                # WFO OOS: ETH+0.336R SOL+0.934R n=21/35 (ADR-gated); BTC see per-symbol
tp_r_4h  = 2.0                # -0.26R (all negative; hard mode will suppress)
tp_r_1d  = 2.0                # +1.21R (4 trades — noisy; hard mode will gate)

[strategy_params.eqh_eql.BTCUSDT]
tp_r_1h  = 3.5                # WFO OOS: BTC 1h peaks at 3.5R (+0.574R ADR-gated, n=40)

[strategy_params.fib_golden_zone]
tp_r_1h  = 5.0                # sweep peak: +0.55R monotonically increasing (stable 27%WR); was 3.5=+0.38R
tp_r_4h  = 3.5                # sweep confirmed: +0.77R
tp_r_1d  = 2.0                # sweep confirmed: +0.32R (8 trades; 2.0R is peak before crash)

[strategy_params.bos]
tp_r_15m = 5.0                # -0.28R (all negative; hard mode will suppress)
tp_r_1h  = 1.5                # -0.28R (all negative; hard mode will suppress)
tp_r_4h  = 2.0                # -0.36R (all negative; hard mode will suppress)

[strategy_params.smt_divergence]
tp_r_15m = 4.5                # sweep peak: +0.80R (was 5.0=+0.72R; clear peak at 4.5)
tp_r_1h  = 2.5                # sweep peak: +0.54R (noisy pattern; crashes at 3.0R+); was 4.5=-0.05R
tp_r_4h  = 2.0                # sweep peak: +0.48R (crashes to -1.02R at 2.5R+); was 5.0=-1.02R
volume_suppress = true        # A14b: normal-vol wins Δ=+0.28R (low +0.54R vs normal +0.82R)

[strategy_params.cvd_divergence]
tp_r_15m = 5.0                # +0.12R (monotonically increasing)
tp_r_1h  = 5.0                # +0.63R (monotonically increasing)
tp_r_4h  = 2.5                # +0.97R (peaks here; 7 trades — small sample)
volume_suppress = false       # T6 Phase A gate audit (2026-05-16): weekend 15m long n=31 supp=+0.580R, 15m short n=56 supp=+0.339R → DISABLE both directions (low-vol IS the winner); cross-config conflict with tue_thu intentional

[strategy_params.trend_day]
tp_r_4h  = 3.5                # WFO OOS: BTC+0.217R ETH+0.041R SOL+0.120R n=52-65 (was 5.0 overfit)
tp_r_1d  = 4.0                # +0.20R
volume_suppress = true        # T6 Phase A gate audit (2026-05-16): 4 of 4 cells ENABLE (15m long n=1564, 15m short n=1447, 1h long n=271, 1h short n=272; all supp_avg_r in [-0.20, -0.08]R)

[strategy_params.orb]
tp_r_1h  = 4.5                # +0.00R (barely positive)
tp_r_4h  = 5.0                # TP sweep peak: cross-symbol +0.23R (119 trades); was 3.5=+0.10R

[strategy_params.liquidity_sweep]
