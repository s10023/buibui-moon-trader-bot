# Signal Watch — all days, full strategy set (reference / backtest profile)
# No day filter, no TF suppression. Use for backtesting or 24/7 coverage.
# Usage: make buibui-signal-watch CONFIG=config/signal_watch_all.toml

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.005

# No day filter — all days including weekends
day_filter = "off"

smt_trend_filter = 1

# Full strategy set — no TF suppression
strategies = [
    'wick_fill',
    'marubozu',
    'orb',
    'liquidity_sweep',
    'fvg',
    'bos',
    'funding_reversion',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone'
]

days = 200
min_trades = 20         # global fallback
# Per-TF overrides — calibrated from DB (200d). Rate differs per TF.
# To scale: new_value = base × (your_days / 200)
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005
# tp_r_values = [1.0, 1.5, 2.0, 2.5, 3.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

[strategy_timeframes]
trend_day = ["4h", "1d"]

[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

[backtest]
mode = "hard"
days = 200
# Thresholds apply to directional trade count (longs for LONG alerts, shorts for SHORT).
# Recalibrated from backtest_runs DB p25 directional counts (90d window):
#   15m p25_long=58 → 20, 1h p25_long=17 → 12, 4h p25_long=4 → 5, 1d p25_long=0 → 2
min_trades = 12         # global fallback (directional)
min_trades_15m = 20
min_trades_1h  = 12
min_trades_4h  = 5
min_trades_1d  = 2
filter_threshold = 0.3
# volume_suppress = false   # enable after confirming via `make buibui-backtest` that low-vol trades underperform
