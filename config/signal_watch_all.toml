# Signal Watch — all days, full strategy set (reference / backtest profile)
# No day filter, no TF suppression. Use for backtesting or 24/7 coverage.
# Usage: make buibui-signal-watch CONFIG=config/signal_watch_all.toml

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.005

# No day filter — all days including weekends
day_filter = "off"

smt_trend_filter = 1

# Full strategy set — no TF suppression
strategies = [
    'wick_fill',
    'marubozu',
    'orb',
    'liquidity_sweep',
    'fvg',
    'bos',
    'funding_reversion',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone'
]

days = 200
min_trades = 20
fee_pct = 0.0005

[strategy_timeframes]
trend_day = ["4h", "1d"]

[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

[backtest]
mode = "hard"
days = 200
min_trades = 20
filter_threshold = 0.3
