# Signal Watch — default configuration (Tue–Thu only, noisy TF combos suppressed)
# Usage: make buibui-signal-watch CONFIG=config/signal_watch.toml
#
# CLI flags always take precedence over values here.

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.005

# Suppress signals by day: "off" | "weekdays" (Mon–Fri) | "tue_thu" (Tue–Thu only)
# "tue_thu" suppresses Mon and Fri (ICT weekly cycle — manipulation/distribution days)
day_filter = "tue_thu"

# EMA-50 trend gate for smt_divergence: LONG only above EMA, SHORT only below (1=on, 0=off)
smt_trend_filter = 1

# Strategies to run
# wick_fill and fvg are excluded: all TFs below mean_r -0.05 threshold (pending parameter tuning)
strategies = [
    'marubozu',
    'orb',
    'liquidity_sweep',
    'bos',
    'funding_reversion',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone',
    'fvg'
]

# SL/TP defaults
# sl_pct = 0.02
# atr_sl_multiplier = 2.0  # ATR-based SL: SL distance = N × ATR14; overrides sl_pct when set
# atr_sl_multiplier_values = [0.5, 1.0, 1.5, 2.0, 2.5]  # sweep: comparison table across multipliers (like tp_r_values)
# NOTE (2026-03-28): ATR sweep showed zero impact — all strategies set sl_price (structural SL),
# so ATR is never reached. Fix needed: use max(structural_sl_dist, atr_sl_dist) as floor first.
# tp_r = 2.0

# Cooldown between same (symbol, strategy, direction) alerts, in seconds
# cooldown_seconds = 3600

# Backtest sweep runner (make buibui-backtest) reads these top-level keys:
days = 200              # lookback window
min_trades = 20         # hide combos with fewer trades in sweep table (global fallback)
# Per-TF overrides — calibrated from backtest_runs DB (200d window).
# Signal rate is NOT uniform across TFs; higher TFs fire less per candle:
#   15m: ~0.0016/candle → 200×96×0.0016≈30
#   1h:  ~0.0042/candle → 200×24×0.0042≈20
#   4h:  ~0.0083/candle → 200×6×0.0083≈10
#   1d:  ~0.025/candle  → 200×1×0.025 ≈5
# To scale for a different window: new_value = base × (your_days / 200)
#   e.g. 100d → 15m=15, 1h=10, 4h=5, 1d=3
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005        # 0.05% taker fee per leg; set 0.0 to disable
# save_results = true   # persist results to backtest_runs / backtest_trades tables in analytics.db
# tp_r_values = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

# Per-strategy timeframe allow-list.
# Strategies listed here are restricted to the specified TFs.
# Strategies not listed run on all configured timeframes.
# TF restrictions derived from backtest data: combos with mean_r < -0.05 suppressed.
# Suppressed combos marked with mean_r in comments — candidates for parameter tuning.
[strategy_timeframes]
trend_day        = ["4h", "1d"]       # 15m mean_r=-0.082 suppressed
fib_golden_zone  = ["4h", "1d"]       # 15m mean_r=-0.254, 1h mean_r=-0.195 suppressed
eqh_eql          = ["4h", "1d"]       # 15m mean_r=-0.137, 1h mean_r=-0.056 suppressed
smt_divergence   = ["15m", "1h", "4h", "1d"]             # post-A18 pivot fix: all combos positive except BTCUSDT 4h (-0.58R); suppressed at runtime by hard-mode filter_threshold=0.3
orb              = ["1h", "4h", "1d"] # 15m mean_r=-0.163 suppressed
bos              = ["15m", "1h", "4h"] # 1d mean_r=-0.785 suppressed; 4h mean_r=+0.223 re-enabled
pin_bar          = ["15m", "1h", "4h", "1d"] # 4h mean_r=-0.137 on weekdays; +0.40R on tue_thu (unlocked)
liquidity_sweep  = ["1h", "1d"]       # 15m mean_r=-0.116, 4h mean_r=-0.160 suppressed
cvd_divergence   = ["15m", "1h", "4h", "1d"] # 1h mean_r=+0.535 re-enabled
morning_evening_star = ["15m", "1h", "4h"] # 1d mean_r=-0.105 suppressed
marubozu         = ["4h", "1d"]       # 15m mean_r=-0.120, 1h mean_r=-0.229 suppressed
order_block      = ["4h", "1d"]       # 15m mean_r=-0.22, 1h mean_r=-0.33 suppressed; 4h+0.03R/1d+0.09R marginally positive but below filter_threshold=0.3 — runtime gate handles suppression

# Per-strategy parameter overrides — tp_r and sl_pct.
# Lookup order: TF-specific key (e.g. tp_r_4h) → strategy-wide tp_r → global tp_r.
# Derived from F6 TP sweep (200d, tue_thu day filter, 3 symbols — BTCUSDT/ETHUSDT/SOLUSDT).
# Re-run after major data changes: make buibui-backtest CONFIG=config/signal_watch.toml SAVE=1
#
# Key differences vs signal_watch_weekdays.toml:
#   - hammer/morning_evening_star 4h are NOW POSITIVE (Mon/Fri were polluting weekdays)
#   - pin_bar 4h also positive (+0.40R) — unlocked from strategy_timeframes below
#   - trend_day and orb now have clear edge — added overrides
#   - bos 4h excluded anyway; all active TFs (15m/1h) improve at 3.0R
[strategy_params.engulfing]
tp_r = 3.0                    # fallback
tp_r_15m = 4.0                # sweep peak: cross-symbol +0.24R (1466 trades)
tp_r_1h  = 4.0                # sweep peak: cross-symbol +0.41R (384 trades)
tp_r_4h = 3.5                 # WFO cross-symbol: BTC 4h +0.390R, SOL 4h +0.450R (25/15 trades)

[strategy_params.engulfing.SOLUSDT]
tp_r_4h = 4.0                 # F5 WFO: SOL 4h optimal at 4.0R

[strategy_params.pin_bar]
tp_r = 3.0                    # fallback
tp_r_15m = 4.5                # WFO ETH 15m +0.211R (519 trades); BTC 15m fully overfit
tp_r_1h = 3.5                 # WFO BTC 1h +0.337R (120 trades)
tp_r_4h = 4.5                 # sweep peak: cross-symbol +0.46R (126 trades)

[strategy_params.hammer_hanging_man]
tp_r = 4.0                    # WFO cross-symbol: BTC/ETH/SOL all positive at 4.0 (15m+1h)
tp_r_1h = 5.0                 # sweep peak: cross-symbol +0.18R (298 trades); monotonic but per-symbol verified

[strategy_params.hammer_hanging_man.ETHUSDT]
tp_r_1h = 5.0                 # F5 WFO: ETH 1h optimal at 5.0R (confirmed by sweep)

[strategy_params.doji]
tp_r = 3.0                    # fallback
tp_r_15m = 4.0                # WFO cross-symbol: BTC 15m +0.339R@3.5, ETH 15m +0.384R@4.0
tp_r_1h  = 3.5                # sweep peak: cross-symbol +0.43R (185 trades)
tp_r_4h  = 4.5                # sweep peak: cross-symbol +0.43R (41 trades)

[strategy_params.doji.BTCUSDT]
tp_r_15m = 3.5                # F5 WFO: BTC 15m optimal at 3.5R (tighter than cross-symbol 4.0)

[strategy_params.doji.ETHUSDT]
tp_r_15m = 4.5                # F5 WFO: ETH 15m optimal at 4.5R

[strategy_params.inside_bar]
tp_r = 3.0                    # fallback
tp_r_4h = 3.5                 # sweep peak: cross-symbol +0.23R (172 trades)

[strategy_params.morning_evening_star]
tp_r = 3.0                    # fallback for 1d
tp_r_15m = 3.5                # WFO BTC 15m OOS +0.339R (162 trades)
tp_r_1h  = 4.0                # sweep peak: cross-symbol +0.19R (713 trades); was 3.5
tp_r_4h  = 5.0                # sweep peak: cross-symbol +0.60R (175 trades), per-symbol consistent; was 2.5

[strategy_params.morning_evening_star.BTCUSDT]
tp_r_15m = 3.5                # F5 WFO: BTC 15m confirmed at 3.5R

[strategy_params.morning_evening_star.ETHUSDT]
tp_r_15m = 4.0                # F5 WFO: ETH 15m optimal at 4.0R

[strategy_params.fib_golden_zone]
tp_r_4h = 3.5                 # sweep peak: cross-symbol +0.85R (31 trades); was 3.0

[strategy_params.fib_golden_zone.ETHUSDT]
tp_r_1h = 4.5                 # F5 WFO: ETH 1h optimal at 4.5R

[strategy_params.bos]
tp_r = 3.0                    # 15m+0.18R, 1h+0.22R (4h excluded via strategy_timeframes)

[strategy_params.trend_day]
tp_r = 3.0                    # fallback for 1d
tp_r_4h = 5.0                 # WFO BTC 4h OOS +0.519R (53 trades)

[strategy_params.orb]
tp_r = 3.0                    # 1h+0.14R (183 trades), 4h+0.17R (119 trades)

# BTCUSDT 4h: -0.58R (15.1% win rate, 53 trades) — only bad SMT combo post-A18 fix.
# Hard-mode filter_threshold=0.3 suppresses at runtime. True per-symbol TF exclusion
# not yet supported in SymbolOverride (only tp_r/sl_pct/atr_sl). Track as code gap if needed.
[strategy_params.smt_divergence.BTCUSDT]
# No param override — BTC 4h relies on hard-mode backtest gate to suppress.
# If per-symbol TF exclusion is added to SymbolOverride, exclude_tfs = ["4h"] here.

# SMT divergence pairs — primary → secondary (must be in coins.json)
[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# Backtest filter for signal watch daemon (signal_config.py reads this sub-table)
[backtest]
mode = "hard"
days = 200
# Thresholds apply to directional trade count (longs for LONG alerts, shorts for SHORT).
# Recalibrated from backtest_runs DB p25 directional counts (90d window):
#   15m p25_long=58 → 20, 1h p25_long=17 → 12, 4h p25_long=4 → 5, 1d p25_long=0 → 2
min_trades = 12         # global fallback (directional)
min_trades_15m = 20
min_trades_1h  = 12
min_trades_4h  = 5
min_trades_1d  = 2
filter_threshold = 0.3
# save_results = true
# volume_suppress = false   # enable after confirming via `make buibui-backtest` that low-vol trades underperform
# liq_sweep_use_fib = true  # set false to compare pivot-sweep mode (wick above pivot + close inside) vs fib-extension mode
# liq_sweep_fib_range_close = false  # (fib mode only) true = close must be < swing_high (inside range), not just < fib level
