# Signal Watch — default configuration
# Usage: make buibui-signal-watch CONFIG=config/signal_watch.toml
#
# CLI flags always take precedence over values here.
# Equivalent to:
#   make buibui-signal-watch TIMEFRAMES="15m 1h 4h 1d" TELEGRAM=1 MIN_SL_PCT=0.01

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.01

# Strategies to run — omit to run all strategies in SIGNAL_REGISTRY
# strategies = ["fvg", "bos", "liquidity_sweep"]

# SL/TP defaults
# sl_pct = 0.02
# tp_r = 2.0

# Cooldown between same (symbol, strategy, direction) alerts, in seconds
# cooldown_seconds = 3600

# Backtest filter — runs historical backtest before each alert
mode = "soft"           # "soft": always fire, append win rate to alert
#                         # "hard": suppress if win_rate < filter_threshold
#                         # "off":  disable entirely
days = 90               # lookback window (reuses already-fetched OHLCV)
min_trades = 20         # below this → bypass filter / show n/a
# filter_threshold = 0.45 # hard mode only
