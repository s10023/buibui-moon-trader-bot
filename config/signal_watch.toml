# Signal Watch — default configuration
# Usage: make buibui-signal-watch CONFIG=config/signal_watch.toml
#
# CLI flags always take precedence over values here.
# Equivalent to:
#   make buibui-signal-watch TIMEFRAMES="15m 1h 4h 1d" TELEGRAM=1 MIN_SL_PCT=0.01

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.01

# Strategies to run — omit to run all strategies in SIGNAL_REGISTRY
# strategies = ["fvg", "bos", "liquidity_sweep"]

# SL/TP defaults
# sl_pct = 0.02
# tp_r = 2.0

# Cooldown between same (symbol, strategy, direction) alerts, in seconds
# cooldown_seconds = 3600

# Backtest sweep runner (make buibui-backtest) reads these top-level keys:
days = 160              # lookback window
min_trades = 20         # hide combos with fewer trades in sweep table
fee_pct = 0.0005        # 0.05% taker fee per leg; set 0.0 to disable

# SMT divergence pairs — primary → secondary (must be in coins.json)
# Used by both signal watch and backtest sweep.
[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# Backtest filter for signal watch daemon (signal_config.py reads this sub-table)
# "soft": always fire alert, append win rate
# "hard": suppress alert if win_rate < filter_threshold (and >= min_trades)
# "off":  disable entirely
[backtest]
mode = "hard"
days = 160
min_trades = 20
filter_threshold = 0.3
