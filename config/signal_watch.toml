# Signal Watch — default configuration (Tue–Thu only, noisy TF combos suppressed)
# Usage: make buibui-signal-watch CONFIG=config/signal_watch.toml
#
# CLI flags always take precedence over values here.

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.005

# Suppress signals by day: "off" | "weekdays" (Mon–Fri) | "tue_thu" (Tue–Thu only)
# "tue_thu" suppresses Mon and Fri (ICT weekly cycle — manipulation/distribution days)
day_filter = "tue_thu"

# EMA-50 trend gate for smt_divergence: LONG only above EMA, SHORT only below (1=on, 0=off)
smt_trend_filter = 1

# Strategies to run
# wick_fill and fvg are excluded: all TFs below mean_r -0.05 threshold (pending parameter tuning)
strategies = [
    'marubozu',
    'orb',
    'liquidity_sweep',
    'bos',
    'funding_reversion',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone'
]

# SL/TP defaults
# sl_pct = 0.02
# tp_r = 2.0

# Cooldown between same (symbol, strategy, direction) alerts, in seconds
# cooldown_seconds = 3600

# Backtest sweep runner (make buibui-backtest) reads these top-level keys:
days = 200              # lookback window
min_trades = 20         # hide combos with fewer trades in sweep table (global fallback)
# Per-TF overrides — takes precedence over min_trades above.
# Rule of thumb: days × candles_per_day × signal_rate
#   Candles per day: 15m=96, 1h=24, 4h=6, 1d=1
#   e.g. 200d/4h: 200×6×0.008≈10;  200d/1d: 200×1×0.025≈5
#   Scale linearly for different lookback windows.
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005        # 0.05% taker fee per leg; set 0.0 to disable
# save_results = true   # persist results to backtest_runs / backtest_trades tables in analytics.db

# Per-strategy timeframe allow-list.
# Strategies listed here are restricted to the specified TFs.
# Strategies not listed run on all configured timeframes.
# TF restrictions derived from backtest data: combos with mean_r < -0.05 suppressed.
# Suppressed combos marked with mean_r in comments — candidates for parameter tuning.
[strategy_timeframes]
trend_day        = ["4h", "1d"]       # 15m mean_r=-0.082 suppressed
fib_golden_zone  = ["4h", "1d"]       # 15m mean_r=-0.254, 1h mean_r=-0.195 suppressed
eqh_eql          = ["4h", "1d"]       # 15m mean_r=-0.137, 1h mean_r=-0.056 suppressed
smt_divergence   = ["1h"]             # 4h mean_r=-0.808, 15m mean_r=-0.137 suppressed
orb              = ["1h", "4h", "1d"] # 15m mean_r=-0.163 suppressed
bos              = ["15m", "1h", "1d"]# 4h mean_r=-0.111 suppressed
pin_bar          = ["15m", "1h", "1d"]# 4h mean_r=-0.137 suppressed
liquidity_sweep  = ["1h", "1d"]       # 15m mean_r=-0.116, 4h mean_r=-0.160 suppressed
cvd_divergence   = ["15m", "4h", "1d"]# 1h mean_r=-0.174 suppressed
marubozu         = ["4h", "1d"]       # 15m mean_r=-0.120, 1h mean_r=-0.229 suppressed

# SMT divergence pairs — primary → secondary (must be in coins.json)
[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# Backtest filter for signal watch daemon (signal_config.py reads this sub-table)
[backtest]
mode = "hard"
days = 200
min_trades = 20         # global fallback
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
filter_threshold = 0.3
# save_results = true
