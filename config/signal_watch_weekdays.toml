# Signal Watch — Mon+Fri-only profile (the two weekdays signal_watch.toml skips)
# Usage: make buibui-signal-watch CONFIG=config/signal_watch_weekdays.toml
#
# Scope: signal_watch.toml runs Tue–Thu; this config covers Mon+Fri so the two
# together span the full work week without overlap. Filename kept as
# "weekdays" for compatibility (Makefile, regression fixtures, DB rating keys);
# day_filter scope is Mon+Fri only.
#
# Inherits: smt_pairs, bias, backtest defaults, and consistent per-strategy flags
# from strategy_params.toml. Only Mon+Fri-specific values are defined here.

extends = "strategy_params.toml"

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]

# Suppress signals by day — Mon+Fri only (complement of signal_watch.toml Tue–Thu).
# Valid values: "off" | "weekdays" | "mon_fri" | "tue_thu" | "weekend" | "no_monfi"
day_filter = "mon_fri"

# Same TF suppression as signal_watch.toml — wick_fill, marubozu, fvg excluded
# Phase 1 (2026-05-07, audit-driven): marubozu + fvg removed entirely (DROP_TF on every TF).
strategies = [
    'orb',
    'liquidity_sweep',
    'bos',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone',
    'ema'
]

# atr_sl_multiplier = 2.0  # ATR-based SL: SL distance = N × ATR14; overrides sl_pct when set
# atr_sl_multiplier_values = [0.5, 1.0, 1.5, 2.0, 2.5]  # sweep: comparison table across multipliers
# tp_r_values = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

[strategy_timeframes]
trend_day            = ["4h", "1d"]
fib_golden_zone      = ["4h", "1d"]       # 15m/1h suppressed (negative)
eqh_eql              = ["1d"]              # 2026-05-17 T6 Phase A strategy_timeframes audit: 1h dropped (raw -0.149R n=184; cr combined -0.146R 1★, long +0.016R 2★, short -0.308R 1★ — no direction strong enough for Bucket C defer). Phase 1: 4h dropped earlier.
smt_divergence       = ["15m", "1h"]      # Phase 1: 4h dropped (audit -0.307R, 25% positive); 1d excluded
orb                  = ["1h", "4h"]        # 15m/1d suppressed (n/a — zero trades on weekdays)
bos                  = ["15m", "1h", "4h"] # 1d all negative excluded
pin_bar              = ["15m", "1h", "1d"] # 2026-05-17 T6 Phase A day-filter audit: 4h dropped (combined -0.33R, 17% WR; long -0.37R n=44, short -0.24R n=34)
liquidity_sweep      = ["1d"]              # Phase 1: 1h dropped (audit -0.250R, 0% positive); 15m/4h already excluded
cvd_divergence       = ["1h"]              # Phase 1: 15m → 1h swap (audit shows 1h 80% positive +0.304R; 15m only 44%)
doji                 = ["15m", "1h"]       # 4h all negative (-0.03R best); 1d too thin (3 trades)
order_block          = ["1d"]              # Phase 1: 4h dropped (audit CONFLUENCE_ONLY -0.079R); 15m/1h already excluded
morning_evening_star = ["15m", "1h", "4h"] # 1d suppressed (negative)
ema                  = ["15m", "4h", "1d"] # 2026-05-17 T6 Phase A day-filter audit: 1h dropped (combined -0.29R, 20% WR; both directions negative). 15m kept — short +0.57R 4★ outweighs long +0.03R 2★.
engulfing            = ["4h", "1d"]        # 2026-05-17 T6 Phase A strategy_timeframes audit: 15m+1h dropped (15m raw -0.052R n=580 cr -0.105R 1★ both dirs negative; 1h raw -0.157R n=144 cr -0.433R 1★ both dirs negative). 4h n=16 / 1d n=1 too sparse to verdict, kept for future re-audit.
hammer_hanging_man   = ["15m", "1h", "1d"] # 2026-05-17 T6 Phase A strategy_timeframes audit: 4h dropped (raw -0.217R n=51; cr combined -0.263R 1★, long -0.176R 1★, short -0.366R 1★ — all losing).

# Per-strategy parameter overrides — tp_r and sl_pct.
# Lookup order: TF-specific key (e.g. tp_r_4h) → strategy-wide tp_r → global tp_r.
# Derived from TP sweep (200d, weekdays, 3 symbols — BTCUSDT/ETHUSDT/SOLUSDT).
# Re-run after major data changes: make buibui-backtest CONFIG=config/signal_watch_weekdays.toml SAVE=1

[strategy_params.ema]
tp_r = 3.0                    # spec §6 default; tune per-TF after WFO sweep

[strategy_params.engulfing]
tp_r_15m = 4.0                # +0.11R
tp_r_1h  = 4.0                # +0.23R
tp_r_4h  = 3.5                # +0.44R; ETH see per-symbol
tp_r_1d  = 3.5                # WFO OOS (weekdays): BTC+0.450R n=3 (2026-04-14); was 3.0; SOL see per-symbol
volume_suppress = false       # A14b: low-vol edge Δ=-0.07R (low +0.19R vs normal +0.12R) — LONG-side; see directional override below
volume_suppress_short = true  # T6 Phase A gate audit (2026-05-16): 1h short n=100, supp_avg_r=-0.050R → ENABLE (mon_fri-specific; tue_thu shorts stay false)

[strategy_params.engulfing.ETHUSDT]
tp_r_4h = 4.0                 # WFO OOS (weekdays): +0.825R n=16 (2026-04-14); diverges from global 3.5R

[strategy_params.engulfing.SOLUSDT]
tp_r_1d = 2.5                 # WFO OOS (weekdays): +0.700R n=2 (2026-04-14); diverges from global 3.5R

[strategy_params.pin_bar]
tp_r_15m = 4.0                # sweep confirmed: +0.09R@4.0R
tp_r_1h  = 4.0                # sweep peak: +0.16R; was 5.0=+0.14R (slight improvement, higher WR)
tp_r_4h  = 3.5                # sweep tied 3.5R/4.0R (+0.08R); higher WR at 3.5R
tp_r_1d  = 3.5                # sweep confirmed: +1.00R (33 trades); SOL see per-symbol

[strategy_params.pin_bar.SOLUSDT]
tp_r_1d = 2.5                 # WFO OOS (weekdays): +0.700R n=6 (2026-04-14); diverges from global 3.5R

[strategy_params.hammer_hanging_man]
tp_r_15m = 3.0                # +0.06R@4.0R but 3.0R also borderline; conservative
tp_r_1h  = 5.0                # sweep confirmed: +0.26R (monotonically increasing)
tp_r_4h  = 4.0                # sweep confirmed: +0.03R (barely positive; hard mode gates if negative)
tp_r_1d  = 4.0                # WFO OOS (weekdays): BTC+1.45R n=3, SOL+1.45R n=2 (2026-04-14); was 3.5

[strategy_params.doji]
tp_r_15m = 4.5                # sweep peak: +0.27R (287 trades, 24%WR); was 3.5=+0.09R
tp_r_1h  = 2.5                # sweep peak: +0.43R (42%WR); was 3.0=+0.40R
# tp_r_4h/tp_r_1d removed — doji restricted to ["15m","1h"] via strategy_timeframes
volume_suppress = true        # A14b: normal-vol wins Δ=+0.11R (low +0.14R vs normal +0.25R)

[strategy_params.inside_bar]
tp_r_15m = 4.0                # +0.06R
tp_r_1h  = 2.5                # +0.08R
tp_r_4h  = 3.5                # +0.14R
tp_r_1d  = 2.5                # +0.17R

[strategy_params.eqh_eql]
tp_r_1h  = 2.5                # WFO OOS (weekdays): BTC+0.47R n=36 (2026-04-14); was 5.0 from unfiltered WFO
tp_r_4h  = 2.0                # -0.27R (all negative; hard mode will suppress)
tp_r_1d  = 2.0                # +0.96R (3 trades — noisy; hard mode will gate)

[strategy_params.eqh_eql.BTCUSDT]
tp_r_1h  = 2.5                # WFO OOS (weekdays): +0.466R n=36 (2026-04-14); was 3.5

[strategy_params.fib_golden_zone]
tp_r_4h  = 3.5                # +1.03R (was 3.0; clear peak)
tp_r_1d  = 3.5                # +0.48R (3 trades; 4.0+ drops to -1.02R — 0 wins)

[strategy_params.bos]
tp_r = 3.0                    # all TFs negative; hard mode suppresses at runtime

[strategy_params.smt_divergence]
tp_r_15m = 4.0                # +0.73R (37% WR; post-spam-fix recalibrated from 5.0)
tp_r_1h  = 5.0                # +0.45R (28 trades, thin — monotonic climb)
tp_r_4h  = 5.0                # +0.18R (10 trades; barely positive, hard mode may gate)

[strategy_params.cvd_divergence]
tp_r_15m = 3.0                # +0.09R@3.0R (noisy; hard mode gates when negative)
# tp_r_1h removed — weekdays CVD 1h ALL NEGATIVE (was +0.97R — degraded with canonical since=2025-09-12)
# tp_r_4h removed — only 3 trades; excluded from strategy_timeframes
volume_suppress = true        # A14b: normal-vol wins Δ=+0.13R (low +0.15R vs normal +0.28R)

[strategy_params.trend_day]
tp_r_4h  = 3.5                # WFO OOS: BTC+0.217R ETH+0.041R SOL+0.120R n=52-65 (was 5.0 overfit)
tp_r_1d  = 4.0                # +0.23R
volume_suppress = true        # T6 Phase A gate audit (2026-05-16): 5 of 6 cells ENABLE (15m long n=1228, 15m short n=1078, 1h long n=245, 1h short n=244, 4h long n=53; 4h short n=32 DISABLE is small-sample noise)

[strategy_params.orb]
tp_r_1h  = 4.5                # +0.02R (barely positive)
tp_r_4h  = 5.0                # TP sweep peak: cross-symbol +0.18R (105 trades); was 3.5=+0.05R

[strategy_params.liquidity_sweep]
tp_r_1h  = 5.0                # -0.25R (all negative; hard mode will suppress)
tp_r_1d  = 3.5                # +0.87R (21 trades, 43% WR)

[strategy_params.marubozu]
tp_r_4h  = 4.5                # -0.27R (all negative; hard mode will suppress)
tp_r_1d  = 2.0                # +0.12R (5 trades — small sample)

[strategy_params.fvg]
tp_r_15m = 3.0                # -0.18R (all negative; hard mode will suppress)
tp_r_1h  = 1.5                # -0.15R (all negative; hard mode will suppress)
tp_r_4h  = 2.5                # -0.23R (all negative; hard mode will suppress)
tp_r_1d  = 4.5                # -0.14R (all negative; hard mode will suppress)
volume_suppress = true        # A14b: normal-vol wins Δ=+0.08R (low -0.20R vs normal -0.12R)

[strategy_params.morning_evening_star]
tp_r_15m = 3.5                # sweep confirmed: +0.06R
tp_r_1h  = 4.0                # sweep confirmed: +0.08R
tp_r_4h  = 5.0                # sweep confirmed: +0.27R (monotonically increasing)
tp_r_1d  = 4.0                # sweep peak: +0.22R (59 trades, 25%WR); was missing

[strategy_params.order_block]
# 15m/1h excluded via strategy_timeframes
tp_r_4h  = 2.5                # -0.01R (breakeven; hard mode may gate)
tp_r_1d  = 1.5                # +0.59R (42 trades, 65% WR)

