# Signal Watch — weekdays profile (Mon–Fri, no weekend signals)
# Usage: make buibui-signal-watch CONFIG=config/signal_watch_weekdays.toml

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.005

# Suppress signals by day: "off" | "weekdays" (Mon–Fri) | "tue_thu" (Tue–Thu only)
day_filter = "weekdays"

smt_trend_filter = 1

# Same TF suppression as signal_watch.toml — wick_fill and fvg excluded
strategies = [
    'marubozu',
    'orb',
    'liquidity_sweep',
    'bos',
    'funding_reversion',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone'
]

days = 200
min_trades = 20         # global fallback
# Per-TF overrides — calibrated from DB (200d). Rate differs per TF.
# To scale: new_value = base × (your_days / 200)
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005
# tp_r_values = [1.0, 1.5, 2.0, 2.5, 3.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

[strategy_timeframes]
trend_day        = ["4h", "1d"]
fib_golden_zone  = ["4h", "1d"]
eqh_eql          = ["4h", "1d"]
smt_divergence   = ["1h"]
orb              = ["1h", "4h", "1d"]
bos              = ["15m", "1h", "1d"]
pin_bar          = ["15m", "1h", "1d"]
liquidity_sweep  = ["1h", "1d"]
cvd_divergence   = ["15m", "4h", "1d"]
marubozu         = ["4h", "1d"]

[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# Per-strategy parameter overrides — tp_r and sl_pct.
# Lookup order: TF-specific key (e.g. tp_r_4h) → strategy-wide tp_r → global tp_r.
# Derived from F6 TP sweep (200d, weekdays, 3 symbols — BTCUSDT/ETHUSDT/SOLUSDT).
# Re-run after major data changes: make buibui-backtest CONFIG=config/signal_watch_weekdays.toml SAVE=1
#
# Candlestick patterns — peak at 3.0R on 1h/4h (monotonically increasing in data).
# 15m candlestick is noise — excluded via [strategy_timeframes] above.
[strategy_params.engulfing]
tp_r = 3.0                    # 1h+0.19R, 4h+0.25R, 1d+0.28R — all TFs benefit

[strategy_params.pin_bar]
tp_r_1h = 3.0                 # 1h+0.26R (best)
tp_r_1d = 3.0                 # 1d+0.60R
# 4h negative across all tp_r — excluded via [strategy_timeframes]

[strategy_params.hammer_hanging_man]
tp_r_1h = 3.0                 # 1h+0.25R (best)
# 4h negative across all tp_r

[strategy_params.doji]
tp_r = 3.0                    # 1h+0.16R, 4h+0.16R non-monotonic but peaks here

[strategy_params.inside_bar]
tp_r = 3.0                    # 1h+0.13R, 4h+0.24R

[strategy_params.morning_evening_star]
tp_r_1h = 3.0                 # 1h+0.13R (best); other TFs marginal

[strategy_params.eqh_eql]
tp_r_1h = 3.0                 # 1h+0.14R — invisible in earlier aggregated view

[strategy_params.fib_golden_zone]
tp_r_4h = 3.0                 # 4h+1.42R monotonically increasing (34 trades)

[strategy_params.bos]
tp_r_4h = 2.5                 # 4h peaks at 2.5R (+0.08R), drops at 3.0R (-0.03R)

[backtest]
mode = "hard"
days = 200
# Thresholds apply to directional trade count (longs for LONG alerts, shorts for SHORT).
# Recalibrated from backtest_runs DB p25 directional counts (90d window):
#   15m p25_long=58 → 20, 1h p25_long=17 → 12, 4h p25_long=4 → 5, 1d p25_long=0 → 2
min_trades = 12         # global fallback (directional)
min_trades_15m = 20
min_trades_1h  = 12
min_trades_4h  = 5
min_trades_1d  = 2
filter_threshold = 0.3
# volume_suppress = false   # enable after confirming via `make buibui-backtest` that low-vol trades underperform
# liq_sweep_use_fib = true  # set false to compare pivot-sweep mode vs fib-extension mode
