# Signal Watch — weekdays profile (Mon–Fri, no weekend signals)
# Usage: make buibui-signal-watch CONFIG=config/signal_watch_weekdays.toml

# Symbols to watch — omit to use all symbols from config/coins.json
# symbols = ["BTCUSDT", "ETHUSDT"]

timeframes = ["15m", "1h", "4h", "1d"]
telegram = true
min_sl_pct = 0.005

# Suppress signals by day: "off" | "weekdays" (Mon–Fri) | "tue_thu" (Tue–Thu only)
day_filter = "weekdays"

smt_trend_filter = 1

# Same TF suppression as signal_watch.toml — wick_fill and fvg excluded
strategies = [
    'marubozu',
    'orb',
    'liquidity_sweep',
    'bos',
    'funding_reversion',
    'smt_divergence',
    'eqh_eql',
    'order_block',
    'cvd_divergence',
    'trend_day',
    'engulfing',
    'pin_bar',
    'inside_bar',
    'hammer_hanging_man',
    'doji',
    'morning_evening_star',
    'fib_golden_zone',
    'fvg'
]

days = 200
min_trades = 20         # global fallback
# Per-TF overrides — calibrated from DB (200d). Rate differs per TF.
# To scale: new_value = base × (your_days / 200)
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005
# atr_sl_multiplier = 2.0  # ATR-based SL: SL distance = N × ATR14; overrides sl_pct when set
# atr_sl_multiplier_values = [0.5, 1.0, 1.5, 2.0, 2.5]  # sweep: comparison table across multipliers
# tp_r_values = [1.5, 2.0, 2.5, 3.0, 3.5, 4.0, 4.5, 5.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

[strategy_timeframes]
trend_day        = ["4h", "1d"]
fib_golden_zone  = ["4h", "1d"]
eqh_eql          = ["4h", "1d"]
smt_divergence   = ["15m", "1h", "4h"]   # 15m=+0.79R best TF; 1d=-1.01R 0% wins excluded
orb              = ["1h", "4h"]          # 1d=n/a (zero trades)
bos              = ["15m", "1h", "4h"]   # 1d=17 trades all negative excluded
pin_bar          = ["15m", "1h", "4h", "1d"]  # 4h=+0.13R (207 trades) re-enabled
liquidity_sweep  = ["1h", "1d"]
cvd_divergence   = ["15m", "1h", "4h"]  # 1h=+0.94R (63 trades) added; 1d=n/a excluded
marubozu         = ["4h", "1d"]

[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# Per-strategy parameter overrides — tp_r and sl_pct.
# Lookup order: TF-specific key (e.g. tp_r_4h) → strategy-wide tp_r → global tp_r.
# Derived from TP sweep (200d, weekdays, 3 symbols — BTCUSDT/ETHUSDT/SOLUSDT).
# Re-run after major data changes: make buibui-backtest CONFIG=config/signal_watch_weekdays.toml SAVE=1

[strategy_params.engulfing]
tp_r_15m = 4.0                # +0.12R
tp_r_1h  = 4.0                # +0.25R
tp_r_4h  = 3.5                # +0.43R
tp_r_1d  = 3.0                # +0.95R (20 trades)

[strategy_params.pin_bar]
tp_r_15m = 4.0                # +0.09R
tp_r_1h  = 4.0                # +0.17R
tp_r_1d  = 3.5                # +1.00R (33 trades)

[strategy_params.hammer_hanging_man]
tp_r_15m = 3.0                # +0.03R (borderline)
tp_r_1h  = 4.0                # +0.22R
tp_r_4h  = 4.0                # +0.01R (borderline)
tp_r_1d  = 3.5                # +0.88R (14 trades)

[strategy_params.doji]
tp_r_15m = 3.5                # +0.10R
tp_r_1h  = 3.0                # +0.29R
tp_r_4h  = 1.5                # +0.12R (47% WR — best for this TF, tie with 5.0R but higher win rate)
tp_r_1d  = 3.5                # +0.68R (13 trades)

[strategy_params.inside_bar]
tp_r_15m = 4.0                # +0.06R
tp_r_1h  = 2.5                # +0.08R
tp_r_4h  = 3.5                # +0.14R
tp_r_1d  = 2.5                # +0.17R

[strategy_params.morning_evening_star]
tp_r_15m = 3.5                # +0.08R
tp_r_1h  = 3.5                # +0.10R
tp_r_4h  = 5.0                # +0.33R (monotonically increasing)
tp_r_1d  = 4.0                # +0.35R (50 trades)

[strategy_params.eqh_eql]
tp_r_4h  = 2.0                # -0.27R (all negative; hard mode will suppress)
tp_r_1d  = 2.0                # +0.96R (3 trades — noisy; hard mode will gate)

[strategy_params.fib_golden_zone]
tp_r_4h  = 3.5                # +1.03R (was 3.0; clear peak)
tp_r_1d  = 3.5                # +0.48R (3 trades; 4.0+ drops to -1.02R — 0 wins)

[strategy_params.bos]
tp_r_15m = 5.0                # -0.26R (all negative; hard mode will suppress)
tp_r_1h  = 2.5                # -0.24R (all negative; hard mode will suppress)
tp_r_1d  = 2.0                # -0.30R (all negative; hard mode will suppress)

[strategy_params.smt_divergence]
tp_r_15m = 5.0                # +0.79R (monotonically increasing; 121 trades)
tp_r_1h  = 5.0                # +0.40R (monotonically increasing)
tp_r_4h  = 5.0                # +0.18R (10 trades; all negative below 4.5R)

[strategy_params.cvd_divergence]
tp_r_15m = 3.0                # +0.04R
tp_r_4h  = 5.0                # +1.38R (monotonically increasing; 5 trades — small sample)

[strategy_params.trend_day]
tp_r_4h  = 5.0                # +0.13R (monotonically increasing)
tp_r_1d  = 4.0                # +0.23R

[strategy_params.orb]
tp_r_1h  = 4.5                # +0.02R (barely positive)
tp_r_4h  = 3.5                # +0.05R

[strategy_params.liquidity_sweep]
tp_r_1h  = 5.0                # -0.25R (all negative; hard mode will suppress)
tp_r_1d  = 3.5                # +0.79R (22 trades)

[strategy_params.marubozu]
tp_r_4h  = 4.5                # -0.27R (all negative; hard mode will suppress)
tp_r_1d  = 2.0                # +0.12R (5 trades — small sample)

[strategy_params.fvg]
tp_r_15m = 3.0                # -0.18R (all negative; hard mode will suppress)
tp_r_1h  = 1.5                # -0.15R (all negative; hard mode will suppress)
tp_r_4h  = 2.5                # -0.23R (all negative; hard mode will suppress)
tp_r_1d  = 4.5                # -0.14R (all negative; hard mode will suppress)

[strategy_params.order_block]
tp_r_15m = 5.0                # -0.16R (all negative; hard mode will suppress)
tp_r_1h  = 5.0                # -0.10R (all negative; hard mode will suppress)
tp_r_4h  = 2.5                # +0.00R (breakeven)
tp_r_1d  = 1.5                # +0.57R (40 trades)

[backtest]
mode = "hard"
days = 200
# Thresholds apply to directional trade count (longs for LONG alerts, shorts for SHORT).
# Recalibrated from backtest_runs DB p25 directional counts (90d window):
#   15m p25_long=58 → 20, 1h p25_long=17 → 12, 4h p25_long=4 → 5, 1d p25_long=0 → 2
min_trades = 12         # global fallback (directional)
min_trades_15m = 20
min_trades_1h  = 12
min_trades_4h  = 5
min_trades_1d  = 2
min_avg_r = 0.0         # hard mode: suppress if directional avg_r < this (positive EV gate)
# filter_threshold = 0.3   # legacy win-rate gate (replaced by min_avg_r)
# volume_suppress = false   # enable after confirming via `make buibui-backtest` that low-vol trades underperform
# liq_sweep_use_fib = true  # set false to compare pivot-sweep mode vs fib-extension mode
# liq_sweep_fib_range_close = true  # (fib mode only) true = close must be < swing_high (inside range), not just < fib level
