# strategy_params.toml — shared base for main signal_watch configs.
#
# Configs that extend this file:
#   signal_watch.toml          (tue_thu day filter)
#   signal_watch_weekdays.toml (weekdays day filter)
#   signal_watch_all.toml      (no day filter)
#
# Usage: add  extends = "strategy_params.toml"  as the first line of a config.
# Keys in the extending config override the base (scalars/arrays replaced, dicts merged).
# The 'extends' key is consumed by the loader — it is not a real TOML field.

telegram = true
min_sl_pct = 0.005

# EMA-50 trend gate for smt_divergence: LONG only above EMA, SHORT only below (1=on, 0=off)
smt_trend_filter = 1

# Backtest sweep runner (make buibui-backtest) reads these top-level keys:
days = 200              # fallback lookback window (ignored when since is set)
since = "2025-09-12"    # canonical anchor — matches data backfill start date; overrides days
min_trades = 20         # hide combos with fewer trades in sweep table (global fallback)
# Per-TF overrides — calibrated from backtest_runs DB (200d window).
# Signal rate is NOT uniform across TFs; higher TFs fire less per candle:
#   15m: ~0.0016/candle → 200×96×0.0016≈30
#   1h:  ~0.0042/candle → 200×24×0.0042≈20
#   4h:  ~0.0083/candle → 200×6×0.0083≈10
#   1d:  ~0.025/candle  → 200×1×0.025 ≈5
# To scale for a different window: new_value = base × (your_days / 200)
#   e.g. 100d → 15m=15, 1h=10, 4h=5, 1d=3
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005        # 0.05% taker fee per leg; set 0.0 to disable

# SMT divergence pairs — identical across all three main configs.
[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# F8 bias layer — identical across all three main configs.
[bias]
adr_suppress_threshold = 0.80

# D10 step 3 — live co-firing confluence detection.
# window: look back this many candles in the signals DB for a co-firing partner.
# min_avg_r: only append the blockquote when the combo backtest avg_r meets this threshold.
[combo]
window = 5
min_avg_r = 1.0

# Backtest filter defaults — identical across all three main configs.
# signal_config.py reads these from [backtest]; backtest_config.py reads min_trades_*tf
# from the top level (above). Both sets are needed.
[backtest]
mode = "hard"
days = 200              # fallback (ignored when since is set)
since = "2025-09-12"    # matches data backfill anchor; overrides days
min_trades = 12
min_trades_15m = 20
min_trades_1h  = 12
min_trades_4h  = 5
min_trades_1d  = 2
min_avg_r = 0.0

# Per-strategy flags consistent across all three main configs.
# Only non-tp_r fields are here — tp_r values are calibrated per day_filter in each config.
# Strategies not listed here have no per-strategy flag override (loader default applies).
[strategy_params.bos]
volume_suppress = true        # A14b: normal-vol wins Δ=+0.11R

[strategy_params.engulfing]
volume_spike_boost = true     # A15 spike sweep: spike +0.59R vs normal +0.23R (73 spikes)

[strategy_params.pin_bar]
tp_r_long = 5.0               # WFO 200d: ETH 1h+15m ↑+0.715R, SOL 1h ↑+0.325R — longs dominate
tp_r_short = 3.0              # WFO 200d: ETH 1h ↓+0.093R; shorts suppressed by hard mode where negative
volume_suppress = false       # A14b: low-vol edge Δ=-0.22R

[strategy_params.hammer_hanging_man]
volume_suppress = false       # A14b: low-vol edge Δ=-0.35R

[strategy_params.morning_evening_star]
tp_r_long = 4.0               # WFO 200d: BTC 15m ↑+0.364R, ETH 15m ↑+0.467R — longs dominate
tp_r_short = 3.0              # WFO 200d: shorts negative on 15m across BTC+ETH; 3.0 = hard-mode fallback
volume_suppress = false       # A14b: low-vol edge (reversal confirmed)

[strategy_params.orb]
volume_suppress = true        # A14b: normal-vol wins Δ=+0.33R

[strategy_params.liquidity_sweep]
volume_suppress = true        # A14b: normal-vol wins Δ=+0.17R

[strategy_params.inside_bar]
tp_r_long = 4.0               # WFO 200d: BTC 1h ↑+0.237R@3.0, SOL 1h ↑+0.286R@4.5 — cross-sym 4.0
tp_r_short = 2.0              # WFO 200d: BTC 1h ↓+0.229R@2.0, SOL 1h ↓+0.303R@1.5 — shorts want fast exit

[strategy_params.marubozu]
volume_suppress = false       # A14b: low-vol edge Δ=-0.43R
