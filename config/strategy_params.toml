# strategy_params.toml — shared base for main signal_watch configs.
#
# Configs that extend this file:
#   signal_watch.toml          (tue_thu day filter)
#   signal_watch_weekdays.toml (weekdays day filter)
#   signal_watch_all.toml      (no day filter)
#
# Usage: add  extends = "strategy_params.toml"  as the first line of a config.
# Keys in the extending config override the base (scalars/arrays replaced, dicts merged).
# The 'extends' key is consumed by the loader — it is not a real TOML field.

telegram = true
min_sl_pct = 0.005

# EMA-50 trend gate for smt_divergence: LONG only above EMA, SHORT only below (1=on, 0=off)
smt_trend_filter = 1

# Backtest sweep runner (make buibui-backtest) reads these top-level keys:
days = 200              # fallback lookback window (ignored when since is set)
since = "2025-09-12"    # canonical anchor — matches data backfill start date; overrides days
min_trades = 20         # hide combos with fewer trades in sweep table (global fallback)
# Per-TF overrides — calibrated from backtest_runs DB (200d window).
# Signal rate is NOT uniform across TFs; higher TFs fire less per candle:
#   15m: ~0.0016/candle → 200×96×0.0016≈30
#   1h:  ~0.0042/candle → 200×24×0.0042≈20
#   4h:  ~0.0083/candle → 200×6×0.0083≈10
#   1d:  ~0.025/candle  → 200×1×0.025 ≈5
# To scale for a different window: new_value = base × (your_days / 200)
#   e.g. 100d → 15m=15, 1h=10, 4h=5, 1d=3
min_trades_15m = 30
min_trades_1h  = 20
min_trades_4h  = 10
min_trades_1d  = 5
fee_pct = 0.0005        # 0.05% taker fee per leg; set 0.0 to disable

# SMT divergence pairs — identical across all three main configs.
[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"
SOLUSDT = "ETHUSDT"

# F8 bias layer — identical across all three main configs.
[bias]
adr_suppress_threshold = 0.80

# F8 HTF EMA directional gate — suppress signals against the HTF trend.
# Per-strategy anchors derived from the 24-cell tue_thu sweep (PR #344):
#   default 4h EMA-50 lifts aggregate avg_r by +0.059 on tue_thu.
#   Per-strategy 1d EMA-50 override flips 5 strategies that 4h hurts
#   (ema, smt_divergence, cvd_divergence, orb, eqh_eql) plus marubozu — net mix
#   captures ~+0.074 lift. 4h EMA-200 dropped (-0.001 delta = no benefit).
#
# Soft-tested 2026-05-05; flipped to hard 2026-05-06.
[bias.htf_ema]
enabled = true
mode = "hard"                  # "soft" = log only; "hard" = drop opposing signals
default_tf = "4h"
default_period = 50
default_slope_lookback = 10
deadband_pct = 0.003           # |slope| < 0.3% over slope_lookback bars → allow

[bias.htf_ema.per_strategy]
ema             = { tf = "1d", period = 50, slope_lookback = 10 }
smt_divergence  = { tf = "1d", period = 50, slope_lookback = 10 }
cvd_divergence  = { tf = "1d", period = 50, slope_lookback = 10 }
orb             = { tf = "1d", period = 50, slope_lookback = 10 }
eqh_eql         = { tf = "1d", period = 50, slope_lookback = 10 }
marubozu        = { tf = "1d", period = 50, slope_lookback = 10 }

# v2 Phase 2 regime gate (per redesign §6).
# Step −1 of the bias chain — runs before F8. Drops signals whose strategy
# type is not enabled in the current 4h-classified regime. F8 then refines
# direction within the allowed regime.
#
# Soft mode first (logs only) — observe ≥2 weeks before flipping to hard:
#   - need ≥500 suppressed candidates in logs.
#   - backtest the suppressed subset → must show avg_r ≤ 0 to justify drop.
#
# `unknown` regime and cache misses always fall open (warmup safe).
[bias.regime]
enabled = true
mode = "soft"                  # "soft" = log only; "hard" = drop suppressed
htf_tf = "4h"                  # regime classified off 4h candles (§6)

# Strategy-type → list of regimes where the type is allowed.
# Continuation types (`trend`, `fib`) only fire in `trend` regime.
# Reversion types (`flow`, `structural`, `price_action`, `candlestick`) and
# `session` are allowed everywhere; F8 then trims counter-trend in `trend`.
# NOTE: `fib` is bound to BOS-anchored detectors (fib_golden_zone, ote_entry).
# If a pure-fib reversion strategy ships, override it via per_strategy below.
[bias.regime.enabled_regimes]
trend         = ["trend"]
fib           = ["trend"]
flow          = ["trend", "range", "high_vol"]
structural    = ["trend", "range", "high_vol"]
price_action  = ["trend", "range", "high_vol"]
candlestick   = ["trend", "range", "high_vol"]
session       = ["trend", "range", "high_vol"]

# Per-strategy override — pin a specific strategy out of its type's mapping.
# bos is continuation despite type=structural (break-of-structure = trend confirmation).
# fib_golden_zone inverted off the default `fib`→`["trend"]` map: gate-replay
# (PR #351) + threshold-sweep (PR #352) showed its trend cells avg_r=−0.11 while
# range/high_vol cells avg_r=+0.02/+0.10 — the §6 default is inverted for this
# strategy. Soft mode keeps the change observable before any hard flip.
[bias.regime.per_strategy]
bos = ["trend"]
fib_golden_zone = ["range", "high_vol"]

# D10 steps 3+4 — live co-firing confluence detection.
# window: look back this many candles in the signals DB for a same-TF co-firing partner.
# min_avg_r: only append the blockquote when the combo backtest avg_r meets this threshold.
# cross_tf_window_hours: window=8h from sweep (1d→1h and 4h→15m pairs, Apr 2026).
[combo]
window = 5
min_avg_r = 1.0
cross_tf_window_hours = 8.0

# Backtest filter defaults — identical across all three main configs.
# signal_config.py reads these from [backtest]; backtest_config.py reads min_trades_*tf
# from the top level (above). Both sets are needed.
[backtest]
mode = "hard"
cache_enabled = true
days = 200              # fallback (ignored when since is set)
since = "2025-09-12"    # matches data backfill anchor; overrides days
min_trades = 12
min_trades_15m = 20
min_trades_1h  = 12
min_trades_4h  = 5
min_trades_1d  = 2
min_avg_r = 0.0

# Per-strategy flags consistent across all three main configs.
# Only non-tp_r fields are here — tp_r values are calibrated per day_filter in each config.
# Strategies not listed here have no per-strategy flag override (loader default applies).
[strategy_params.bos]
volume_suppress = true        # A14b: normal-vol wins Δ=+0.11R

[strategy_params.engulfing]
volume_suppress_long = true   # directional: LONG low-vol -0.13R→+0.22R (tue_thu Δ=+0.36R); SHORT low-vol +0.72R — keep
volume_spike_boost = true     # A15 spike sweep: spike +0.59R vs normal +0.23R (73 spikes)

[strategy_params.pin_bar]
tp_r_long = 5.0               # WFO 200d: ETH 1h+15m ↑+0.715R, SOL 1h ↑+0.325R — longs dominate
tp_r_short = 3.0              # WFO 200d: ETH 1h ↓+0.093R; shorts suppressed by hard mode where negative
volume_suppress = false       # A14b: low-vol edge Δ=-0.22R

[strategy_params.hammer_hanging_man]
volume_suppress = false       # A14b: low-vol edge Δ=-0.35R

[strategy_params.morning_evening_star]
tp_r_long = 4.0               # WFO 200d: BTC 15m ↑+0.364R, ETH 15m ↑+0.467R — longs dominate
tp_r_short = 3.0              # WFO 200d: shorts negative on 15m across BTC+ETH; 3.0 = hard-mode fallback
volume_suppress = false       # A14b: low-vol edge (reversal confirmed)

[strategy_params.orb]
volume_suppress = true        # A14b: normal-vol wins Δ=+0.33R

[strategy_params.liquidity_sweep]
volume_suppress = true        # A14b: normal-vol wins Δ=+0.17R

[strategy_params.inside_bar]
tp_r_long = 4.0               # WFO 200d: BTC 1h ↑+0.237R@3.0, SOL 1h ↑+0.286R@4.5 — cross-sym 4.0
tp_r_short = 2.0              # WFO 200d: BTC 1h ↓+0.229R@2.0, SOL 1h ↓+0.303R@1.5 — shorts want fast exit

[strategy_params.marubozu]
volume_suppress = false       # A14b: low-vol edge Δ=-0.43R
