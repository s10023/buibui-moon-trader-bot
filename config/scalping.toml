# Scalping profile — short timeframes, tight SL/TP, fast cooldowns.
#
# Purpose: catch high-frequency intraday setups on 1m–15m candles.
# Best suited for: orb, wick_fill, fvg, bos, liquidity_sweep, pin_bar, engulfing.
# Not included: trend-following strategies that need daily context (trend_day,
#               fib_golden_zone, order_block, eqh_eql, marubozu).
#
# Usage: make buibui-signal-watch CONFIG=config/scalping.toml

timeframes = ["1m", "5m", "15m"]
telegram = true
min_sl_pct = 0.002

# Tighter SL and 1.5x R target for scalps
sl_pct = 0.005
tp_r = 1.5

# Short cooldown — same setup can re-fire within 15 minutes
cooldown_seconds = 900

# Scalping-friendly strategies only
strategies = [
    'orb',
    'wick_fill',
    'fvg',
    'bos',
    'liquidity_sweep',
    'pin_bar',
    'engulfing',
    'inside_bar',
    'doji',
]

# Suppress Monday and Friday noise
day_filter = false

# Backtest window for signal quality check
days = 30
min_trades = 10         # global fallback; 30d/15m formula: 30×96×0.0016≈5, so 10 is already conservative
fee_pct = 0.0005
# tp_r_values = [1.0, 1.5, 2.0, 2.5, 3.0]  # TP ratio sweep — prints comparison table instead of ranked sweep

[smt_pairs]
BTCUSDT = "ETHUSDT"
ETHUSDT = "BTCUSDT"

[backtest]
mode = "soft"
days = 30
# Thresholds apply to directional trade count (longs for LONG alerts, shorts for SHORT).
# 30d/15m directional estimate: p25_long(90d)=58 × (30/90) ≈ 19 — so 10 is conservative.
min_trades = 10         # global fallback (directional)
filter_threshold = 0.4
# volume_suppress = false   # enable after confirming via `make buibui-backtest` that low-vol trades underperform
